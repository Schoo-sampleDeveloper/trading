name: デイリー金融ニュース自動生成

on:
  schedule:
    # 平日 6:30 JST = UTC 21:30 (前日)
    # 日曜〜木曜 21:30 UTC = 月〜金 6:30 JST
    - cron: '30 21 * * 0-4'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write
  issues: write   # preferences Issueのclose操作に必要

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: ニュース収集・要約・サイト生成
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: docs/ と data/ を Git にコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet && echo "変更なし。スキップ。" || (
            git commit -m "chore: update daily news $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')"
            git push
          )
